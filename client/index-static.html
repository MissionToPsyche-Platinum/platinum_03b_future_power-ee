      // SPA redirect handler for GitHub Pages
      (function() {
        var redirect = sessionStorage.getItem('redirect');

          sessionStorage.removeItem('redirect');

            window.history.replaceState(null, null, '/platinum_03b_future_power-ee' + redirect);
          }
        }
      })();
