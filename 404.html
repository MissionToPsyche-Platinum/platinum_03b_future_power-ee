<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>16 Psyche Power System Simulator</title>
    <script>
      // GitHub Pages SPA redirect: preserve the path and redirect to index.html
      // This allows client-side routing to work on GitHub Pages
      var segmentCount = 0; // 0 for user.github.io/repo-name, 1 for user.github.io
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
